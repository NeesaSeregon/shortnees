nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ["%env(CORS_ALLOW_ORIGIN)%"]
        allow_credentials: true
        allow_methods: ["GET", "OPTIONS", "POST", "PUT", "PATCH", "DELETE"]
        allow_headers: ["Content-Type"]
        expose_headers: ["Link"]
        max_age: 3600
    paths:
        '^/api/':
            allow_origin: ["%env(CORS_ALLOW_ORIGIN)%"]
            allow_credentials: true
            allow_headers: ["Content-Type"]
            allow_methods: ["GET", "POST", "OPTIONS", "PUT", "DELETE"]
            max_age: 3600
