<main class="container d-flex justify-content-center vh-100 ">
  <div class="card p-4 rounded shadow-sm">
    <div class="card-body">
      <h5 class="card-title text-center">Iniciar Sesión</h5>
      <form class="" [formGroup]="formularioLogin" (ngSubmit)="iniciarSesion()">
        <div class="mb-3">
          <label for="correo" class="form-label">Email</label>
          <input type="email" class="form-control" id="correo" formControlName="correo" placeholder="Ex. pat@example.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" formControlName="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
        <button type="button" class="btn btn-link w-100 mt-2" (click)="registrarse()">Registrarse</button>
        @if (error !== ''){
          <p class="error fs-4">{{error}}</p>
        }
      </form>
    </div>
  </div>
</main>
