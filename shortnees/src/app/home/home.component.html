<main class="home-main">
  <div class="container home-container">

    <div class="home-intro">
      <h1 class="home-title">Acorta tu URL</h1>
      <p class="home-subtitle">Rápido, personalizable y con estadísticas</p>
    </div>

    @if (isAuthenticated) {
      <div class="home-card">
        <div class="home-card-line"></div>
        <form [formGroup]="formularioPersonalizar" class="home-form">
          <div class="home-field">
            <label for="urlOriginal" class="home-label">URL Original</label>
            <div class="home-input-group">
              <span class="home-input-prefix"><i class="bi bi-link-45deg"></i></span>
              <input id="urlOriginal" class="home-input" formControlName="urlOriginal" type="text" placeholder="Ingresa la URL que deseas acortar">
            </div>
          </div>
          <div class="home-field">
            <label for="urlPersonalizada" class="home-label">URL Personalizada</label>
            <div class="home-input-group">
              <span class="home-input-prefix">shortns.com/</span>
              <input id="urlPersonalizada" class="home-input" formControlName="urlPersonalizada" type="text" placeholder="Crea tu nueva URL corta">
            </div>
          </div>
          <button class="home-btn" (click)="personalizar()" type="button" [disabled]="formularioPersonalizar.invalid">
            <i class="bi bi-scissors"></i> Personalizar URL
          </button>
        </form>
      </div>
      @if (errorP !== '') {
        <div class="home-error">
          <i class="bi bi-exclamation-circle-fill"></i>
          {{ errorP }}
        </div>
      }
      @if (shortUrlP !== '') {
        <div class="home-result">
          <input class="home-result-input" value="{{ shortUrlP }}" type="text" readonly>
        </div>
      }
    } @else {
      <div class="home-card">
        <div class="home-card-line"></div>
        <form [formGroup]="formulario" class="home-form">
          <div class="home-field">
            <label for="url" class="home-label">URL a acortar</label>
            <div class="home-input-group">
              <span class="home-input-prefix"><i class="bi bi-link-45deg"></i></span>
              <input id="url" class="home-input" formControlName="url" type="text" placeholder="Ingresa la URL que deseas acortar">
            </div>
          </div>
          <button class="home-btn" (click)="acortar()" type="button" [disabled]="formulario.invalid">
            <i class="bi bi-scissors"></i> Acortar URL
          </button>
        </form>
      </div>
      @if (error !== '') {
        <div class="home-error">
          <i class="bi bi-exclamation-circle-fill"></i>
          {{ error }}
        </div>
      }
      @if (shortUrl !== '') {
        <div class="home-result">
          <input class="home-result-input" value="{{ shortUrl }}" type="text" readonly>
        </div>
      }
    }

  </div>
</main>
