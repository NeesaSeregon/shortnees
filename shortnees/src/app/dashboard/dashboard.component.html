<main class="container mt-4 h-100">
    @if (enlaces.length > 0) {
      <h2>Mis Enlaces:</h2>
        @for (enlace of enlaces; track enlace.id) {
            <div class="card">
              <div class="card-body">
                <strong>link:</strong> {{ enlace.urlCorta }}<br>
                <!-- verEstadisticasDispositivo(enlace.id);
                <strong>URL Original:</strong> {{ enlace.urlOriginal }}<br>
                <strong>Creado en:</strong> {{ enlace.fechaCreacion }}<br>
                <strong>Expira en:</strong> {{ enlace.fechaExpiracion }}<br> -->
                <!-- Botones para acciones -->
                <button (click)="eliminarEnlace(enlace.id)" class="btn btn-danger btn-sm">Eliminar Enlace</button>
                <button (click)="urlSeleccionada(enlace.urlCorta); verEstadisticasDispositivo(enlace.id); verEstadisticasFecha(enlace.id);
                verEstadisticasPais(enlace.id); verEstadisticas(enlace.id)" class="btn btn-primary btn-sm">Ver Estadísticas</button>    
              </div>
            </div>
        }
      <!-- Mostrar estadísticas si están disponibles -->
      @if (estadisticas) {
        <div class="mt-4">
          <div class="alert alert-info">
            <h3 class="mb-3">Estadísticas del Enlace {{ urlCortaSeleccionada }}</h3>
            <!-- <strong>Número de clics:</strong> {{ estadisticas.numeroClicks }}-->
          </div>
          <h4 class="mt-4 mb-3">Detalles:</h4>
          <div class="row">
            <!--@for (detalle of estadisticas.detalles; track detalle.id) {-->
              <div class="col-md-10 mb-3">
                <div class="card">
                  <div class="card-body">
                    <ngx-charts-advanced-pie-chart
                    [results]="dataBarPais"
                    [gradient]="gradient"
                    >
                    </ngx-charts-advanced-pie-chart>
                  </div>
                </div>
                <div class="card">
                  <div class="card-body">
                    <ngx-charts-advanced-pie-chart
                    [results]="dataBarDispositivo"
                    [gradient]="gradient"
                    >
                    </ngx-charts-advanced-pie-chart>
                   <!-- <p class="card-text"><strong>Fecha Click:</strong> {{ detalle.fecha_click }}</p>
                    <p class="card-text"><strong>IP Usuario:</strong> {{ detalle.ip_usuario }}</p>
                    <p class="card-text"><strong>Ubicación:</strong> {{ detalle.ubicacion }}</p>
                    <p class="card-text"><strong>Dispositivo:</strong> {{ detalle.dispositivo }}</p> -->
                  </div>
                </div>
                <!--<div class="card">
                  <div class="card-body">
                    <ngx-charts-advanced-pie-chart
                    [results]="dataBarFecha"
                    [gradient]="gradient"
                    >
                    </ngx-charts-advanced-pie-chart>
                  </div>
                </div>-->
              </div>
            <!--}-->
          </div>
        </div>
      }
    } @else {
      <div class="alert alert-warning mt-4" role="alert">
        No tienes enlaces disponibles.
      </div>
    }
</main>
