<main class="container-fluid px-4 mt-4">
  @if (enlaces.length > 0) {
    <h2 class="text-center mb-4">Mis Enlaces</h2>

    <div class="row g-2 justify-content-center">
      @for (enlace of enlaces; track enlace.id) {
        <div class="col-6 col-sm-4 col-md-3 col-xl-2">
          <button
            class="button-enlaces w-100"
            (click)="urlSeleccionada(enlace.urlCorta);
                     verEstadisticasDispositivo(enlace.id);
                     verEstadisticasFecha(enlace.id);
                     verEstadisticasPais(enlace.id);
                     verEstadisticas(enlace.id)">
            {{ enlace.urlCorta }}
          </button>
        </div>
      }
    </div>

    @if (estadisticas) {
      <div class="mt-5">
        <h3 class="text-center mb-4">{{ urlCortaSeleccionada }}</h3>
        <div class="row g-4">
          <div class="col-12 col-md-6">
            <div class="card h-100">
              <div class="card-body chart-body">
                <h5 class="card-title">Por país</h5>
                <ngx-charts-advanced-pie-chart
                  [view]="view"
                  [results]="dataBarPais"
                  [gradient]="gradient">
                </ngx-charts-advanced-pie-chart>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="card h-100">
              <div class="card-body chart-body">
                <h5 class="card-title">Por dispositivo</h5>
                <ngx-charts-advanced-pie-chart
                  [view]="view"
                  [results]="dataBarDispositivo"
                  [gradient]="gradient">
                </ngx-charts-advanced-pie-chart>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="card h-100">
              <div class="card-body chart-body">
                <h5 class="card-title">Por fecha</h5>
                <ngx-charts-advanced-pie-chart
                  [view]="view"
                  [results]="dataBarFecha"
                  [gradient]="gradient">
                </ngx-charts-advanced-pie-chart>
              </div>
            </div>
          </div>
        </div>
      </div>
    }

  } @else {
    <div class="alert alert-warning mt-4" role="alert">
      No tienes enlaces disponibles.
    </div>
  }
</main>
