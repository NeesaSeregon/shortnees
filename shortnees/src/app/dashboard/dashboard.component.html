<main class="container-fluid px-4 mt-4">
  @if (enlaces.length > 0) {
    <h2 class="text-center mb-4">Mis Enlaces</h2>

    <div class="row g-2 justify-content-center">
      @for (enlace of enlaces; track enlace.id) {
        <div class="col-6 col-sm-4 col-md-3 col-xl-2">
          <button
            class="button-enlaces w-100"
            [class.activo]="enlace.id === enlaceSeleccionadoId"
            (click)="seleccionar(enlace)">
            {{ enlace.urlCorta }}
          </button>
        </div>
      }
    </div>

    @if (estadisticas) {
      <hr class="stats-divider">

      <!-- Cabecera de estadísticas -->
      <div class="stats-header text-center">
        <p class="stats-url"><i class="bi bi-link-45deg"></i> {{ urlCortaSeleccionada }}</p>
        <p class="stats-num">{{ estadisticas.numeroClicks }}</p>
        <p class="stats-label">clics totales</p>
      </div>

      <!-- Gráficas -->
      <div class="row g-4 mt-2">
        <div class="col-12 col-md-6">
          <div class="card chart-card">
            <div class="card-body chart-body">
              <h6 class="chart-title"><i class="bi bi-globe2 me-2"></i>Por país</h6>
              <ngx-charts-advanced-pie-chart
                [view]="view"
                [results]="dataBarPais"
                [gradient]="gradient">
              </ngx-charts-advanced-pie-chart>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="card chart-card">
            <div class="card-body chart-body">
              <h6 class="chart-title"><i class="bi bi-phone me-2"></i>Por dispositivo</h6>
              <ngx-charts-advanced-pie-chart
                [view]="view"
                [results]="dataBarDispositivo"
                [gradient]="gradient">
              </ngx-charts-advanced-pie-chart>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="card chart-card">
            <div class="card-body chart-body">
              <h6 class="chart-title"><i class="bi bi-calendar3 me-2"></i>Por fecha</h6>
              <ngx-charts-advanced-pie-chart
                [view]="view"
                [results]="dataBarFecha"
                [gradient]="gradient">
              </ngx-charts-advanced-pie-chart>
            </div>
          </div>
        </div>
      </div>
    }

  } @else {
    <div class="alert alert-warning mt-4" role="alert">
      No tienes enlaces disponibles.
    </div>
  }
</main>
