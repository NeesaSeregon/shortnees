<main class="container d-flex align-items-center justify-content-center vh-100">
  <div class="card" style="width: 400px;">
    <div class="card-body">
      <h5 class="card-title text-center">Registrarse</h5>
      <form [formGroup]="formularioRegistro" (ngSubmit)="submit()">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="nombre" class="form-control" id="nombre" placeholder="Ex. pat@example.com" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" formControlName="email" placeholder="Ex. pat@example.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" formControlName="password" placeholder="Contraseña" required>
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit">Registrarse</button>
        <button type="button" class="btn btn-link w-100 mt-2">Ya tengo cuenta</button>
      </form>
    </div>
  </div>
</main>
